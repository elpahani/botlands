services:
  backend:
    build:
      context: ./backend
    container_name: botlands-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ${WORKSPACE_PATH:-./data}:/app/data
      - compland:/app/compland
    environment:
      - DATA_DIR=/app/data
      - COMPLAND_BASE_PATH=/app/compland
      - COMPLAND_MAX_PARALLEL=${COMPLAND_MAX_PARALLEL:-4}
      - COMPLAND_TIMEOUT_MS=${COMPLAND_TIMEOUT_MS:-60000}
      - COMPLAND_MEMORY_MB=${COMPLAND_MEMORY_MB:-512}
      - NODE_ENV=production
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
      - OCR_SERVICE_URL=http://ocr-service:8000
    networks:
      - botlands
      - inference
    depends_on:
      - ocr-service

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/api
    container_name: botlands-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - botlands

  ocr-service:
    build:
      context: ./ocr-service
    container_name: botlands-ocr
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - botlands
    volumes:
      - ${WORKSPACE_PATH:-./data}:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  compland:

networks:
  botlands:
    name: botlands
    driver: bridge
  inference:
    name: inference
    driver: bridge
